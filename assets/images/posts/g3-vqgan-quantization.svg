<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <defs>
    <style>
      .bg { fill: transparent; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 1.8; }
      .grid { fill: none; stroke: #6b7280; stroke-width: 1.2; }
      .sel { fill: #e5e7eb; stroke: #111827; stroke-width: 1.4; }
      .entry { fill: none; stroke: #6b7280; stroke-width: 1.2; }
      .entrysel { fill: #e5e7eb; stroke: #111827; stroke-width: 1.4; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#m); }
      .title { font: 700 17px Georgia, 'Times New Roman', serif; fill: #111827; text-anchor: middle; }
      .math { font: italic 15px Georgia, 'Times New Roman', serif; fill: #111827; text-anchor: middle; }
      .text { font: 14px Georgia, 'Times New Roman', serif; fill: #374151; text-anchor: middle; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="300"/>

  <rect class="panel" x="40" y="58" width="240" height="180"/>
  <text class="title" x="160" y="92">Encoder output</text>
  <text class="math" x="160" y="118">z_e(x)</text>
  <rect class="grid" x="90" y="135" width="36" height="36"/>
  <rect class="grid" x="126" y="135" width="36" height="36"/>
  <rect class="grid" x="162" y="135" width="36" height="36"/>
  <rect class="grid" x="198" y="135" width="36" height="36"/>
  <rect class="grid" x="90" y="171" width="36" height="36"/>
  <rect class="sel"  x="126" y="171" width="36" height="36"/>
  <rect class="grid" x="162" y="171" width="36" height="36"/>
  <rect class="grid" x="198" y="171" width="36" height="36"/>
  <text class="math" x="144" y="228">z_{e,ij}(x)</text>

  <rect class="panel" x="370" y="58" width="240" height="180"/>
  <text class="title" x="490" y="92">Codebook</text>
  <text class="math" x="490" y="118">Z = {e_k}</text>
  <rect class="entry" x="430" y="140" width="120" height="26"/>
  <rect class="entry" x="430" y="174" width="120" height="26"/>
  <rect class="entrysel" x="430" y="208" width="120" height="26"/>
  <text class="math" x="490" y="158">e_1, e_2, ..., e_K</text>
  <text class="math" x="490" y="225">e_{q_{ij}}</text>

  <rect class="panel" x="700" y="58" width="240" height="180"/>
  <text class="title" x="820" y="92">Quantized latent</text>
  <text class="math" x="820" y="118">z_q = e_q</text>
  <text class="math" x="820" y="165">q = argmin_k d(z_e, e_k)</text>
  <text class="math" x="820" y="210">{q_ij}</text>

  <path class="arrow" d="M280 172 H370"/>
  <path class="arrow" d="M610 172 H700"/>
</svg>
